repos:
  - repo: local
    hooks:
      - id: sync-branch
        name: Branch up to date
        language: system
        entry: go run .
        pass_filenames: false
        always_run: true
  - repo: local
    hooks:
      - id: check-pre-push-hook
        name: pre-push hook installed
        language: script
        entry: scripts/check-pre-push-hook.sh
        pass_filenames: false
        always_run: true
